name: Deploy Ladle

# Republish the Ladle UI-library preview on every merge to main.
# Served at https://tasandberg.github.io/reactor-sheet/ladle/.
on:
  push:
    branches: [main]

# peaceiris/actions-gh-pages pushes to the gh-pages branch via GITHUB_TOKEN.
permissions:
  contents: write

# Never let two deploys race the gh-pages branch.
concurrency:
  group: deploy-ladle
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Base path must match where it's served on gh-pages (the ladle/ subfolder).
      - run: pnpm ladle:build --base /reactor-sheet/ladle/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          destination_dir: ladle
          keep_files: true # preserve the rest of the gh-pages branch
