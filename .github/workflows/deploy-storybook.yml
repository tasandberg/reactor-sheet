name: Deploy Storybook

# Republish the Storybook UI-library preview on every merge to main.
# Served at https://tasandberg.github.io/reactor-sheet/storybook/.
on:
  push:
    branches: [main]

# peaceiris/actions-gh-pages pushes to the gh-pages branch via GITHUB_TOKEN.
permissions:
  contents: write

# Never let two deploys race the gh-pages branch.
concurrency:
  group: deploy-storybook
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Storybook static output uses relative asset paths, so it serves fine
      # from the /reactor-sheet/storybook/ subfolder without a base flag.
      - run: pnpm storybook:build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          destination_dir: storybook
          keep_files: true # preserve the rest of the gh-pages branch
