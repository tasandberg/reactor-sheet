name: CI

on:
  pull_request:
  push:
    branches: [main, vellum-system-audit]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # eslint + stylelint design-token guardrails
      - run: pnpm lint

      # tsc -b + vite build
      - run: pnpm build

      - run: pnpm test
